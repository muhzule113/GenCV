name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Lint
        run: npm run lint
        env:
          NODE_ENV: ci
      
      - name: Run tests
        run: npm test
      
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Deploy to InsForge
        if: github.ref == 'refs/heads/main'
        env:
          INSFORGE_DEPLOY_TOKEN: ${{ secrets.INSFORGE_DEPLOY_TOKEN }}
        run: |
          echo "Deploy would trigger here with configured provider"
          # npm run deploy (when configured)
