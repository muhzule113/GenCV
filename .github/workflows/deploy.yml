name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint
        env:
          NODE_ENV: ci

      - name: Run tests
        run: npm test

      - name: Resolve Vite build env
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}
        run: |
          echo "VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://gencv.muhzule.com}" >> "$GITHUB_ENV"
          echo "VITE_APP_URL=${VITE_APP_URL:-https://gencv.muhzule.com}" >> "$GITHUB_ENV"

      - name: Build (verify Vite prod env)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_MIDTRANS_CLIENT_KEY: ${{ secrets.VITE_MIDTRANS_CLIENT_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy to VPS
        if: github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ vars.DEPLOY_PATH || '/opt/gencv' }}"
            cd "$APP_DIR"

            git fetch origin main
            git reset --hard origin/main

            ENV_FILE=".env.production"
            if [ ! -f "$ENV_FILE" ] && [ -f .env ]; then
              ENV_FILE=".env"
            fi
            if [ ! -f "$ENV_FILE" ]; then
              echo "Missing $ENV_FILE on server — create it before deploying"
              exit 1
            fi

            docker compose --env-file "$ENV_FILE" up -d --build --remove-orphans
            docker compose --env-file "$ENV_FILE" ps
            echo "Deploy finished at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
