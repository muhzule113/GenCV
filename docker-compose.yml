services:
  postgres:
    image: postgres:17-alpine
    container_name: gencv-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gencv
      POSTGRES_USER: gencv_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gencv_dev_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/0001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gencv_user -d gencv"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://gencv.muhzule.com}
        VITE_APP_URL: ${VITE_APP_URL:-https://gencv.muhzule.com}
        VITE_MIDTRANS_CLIENT_KEY: ${VITE_MIDTRANS_CLIENT_KEY:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    container_name: gencv-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://gencv_user:${DB_PASSWORD:-gencv_dev_password}@postgres:5432/gencv
      - RUN_MIGRATIONS=true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
