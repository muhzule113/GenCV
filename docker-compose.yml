version: "3.9"

services:
  app:
    build: .
    container_name: gencv-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      # CLIENT_URL = domain production. Bisa comma-separated
      # Contoh: CLIENT_URL=https://gencv.com,https://www.gencv.com
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
